name: Package aMuTorrent

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: package x64
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      amutorrent_repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      amutorrent_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      node_version: '24'
      node_cache_dependency_path: |
        repos/amutorrent/package-lock.json
        repos/amutorrent/server/package-lock.json
      timeout_minutes: 180
      command: |
          python -m emule_workspace package-amutorrent `
          --config Release `
          --platform x64 `
          --release-version 0.7.3 `
          --clean
