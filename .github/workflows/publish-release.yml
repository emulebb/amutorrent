name: Publish release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "eMuleBB package version, for example 0.7.3-rc.1 or 0.7.3"
        required: true
        type: string
      target_sha:
        description: "Full aMuTorrent commit SHA to build, tag, and publish"
        required: true
        type: string
      build_ref:
        description: "emulebb-build ref used by the reusable workspace command"
        required: false
        default: main
        type: string

permissions:
  attestations: write
  artifact-metadata: write
  contents: write
  id-token: write

concurrency:
  group: amutorrent-release-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      amutorrent_version: ${{ steps.meta.outputs.amutorrent_version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      package_version: ${{ steps.meta.outputs.package_version }}
      release_kind: ${{ steps.meta.outputs.release_kind }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout aMuTorrent source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release inputs
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ inputs.release_version }}
          TARGET_SHA: ${{ inputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${PACKAGE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta)\.[0-9]+)?$ ]]; then
            echo "Unsupported package version: ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          if [[ ! "${TARGET_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "target_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi

          target_sha="${TARGET_SHA,,}"
          release_kind="stable"
          is_prerelease="false"
          if [[ "${PACKAGE_VERSION}" =~ -(rc|beta)\.[0-9]+$ ]]; then
            release_kind="prerelease"
            is_prerelease="true"
          fi

          if ! git cat-file -e "${target_sha}^{commit}" 2>/dev/null; then
            git fetch origin "${target_sha}"
          fi
          git cat-file -e "${target_sha}^{commit}"

          amutorrent_version="$(
            TARGET_SHA="${target_sha}" python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          target = os.environ["TARGET_SHA"]

          def read_version(path: str) -> str:
              payload = subprocess.check_output(["git", "show", f"{target}:{path}"], text=True)
              return json.loads(payload)["version"]

          root_version = read_version("package.json")
          server_version = read_version("server/package.json")
          if root_version != server_version:
              print(
                  f"aMuTorrent version mismatch: package.json={root_version}, "
                  f"server/package.json={server_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(root_version)
          PY
          )"

          if [[ ! "${amutorrent_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Unsupported aMuTorrent version: ${amutorrent_version}" >&2
            exit 1
          fi

          tag_name="amutorrent-v${amutorrent_version}-emulebb-v${PACKAGE_VERSION}"

          if gh release view "${tag_name}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists: ${tag_name}" >&2
            exit 1
          fi

          tag_exists="false"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${tag_name}:refs/tags/${tag_name}"
            tag_exists="true"
            tag_type="$(git cat-file -t "${tag_name}")"
            if [[ "${tag_type}" != "tag" ]]; then
              echo "Existing tag is not annotated: ${tag_name}" >&2
              exit 1
            fi
            peeled="$(git rev-parse "${tag_name}^{}")"
            if [[ "${peeled,,}" != "${target_sha}" ]]; then
              echo "Existing tag ${tag_name} points at ${peeled}, expected ${target_sha}." >&2
              exit 1
            fi
          fi

          {
            echo "amutorrent_version=${amutorrent_version}"
            echo "is_prerelease=${is_prerelease}"
            echo "package_version=${PACKAGE_VERSION}"
            echo "release_kind=${release_kind}"
            echo "tag_exists=${tag_exists}"
            echo "tag_name=${tag_name}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build Windows package
    needs: prepare
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      amutorrent_repository: ${{ github.repository }}
      amutorrent_ref: ${{ needs.prepare.outputs.target_sha }}
      build_ref: ${{ inputs.build_ref }}
      node_version: "24"
      node_cache_dependency_path: |
        repos/amutorrent/package-lock.json
        repos/amutorrent/server/package-lock.json
      timeout_minutes: 180
      artifact_name: amutorrent-${{ needs.prepare.outputs.package_version }}-x64
      artifact_path: release-artifacts/*
      failure_artifact_name: amutorrent-release-build-logs-${{ needs.prepare.outputs.package_version }}
      failure_artifact_path: logs/builds/**
      command: |
        $packageVersion = "${{ needs.prepare.outputs.package_version }}"

        python -m emule_workspace package-amutorrent `
          --config Release `
          --platform x64 `
          --release-version $packageVersion `
          --clean

        $releaseRoot = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "release\emulebb-v$packageVersion"
        $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "release-artifacts"
        New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

        $requiredAssets = @(
          "emulebb-$packageVersion-amutorrent-x64.zip",
          "emulebb-$packageVersion-amutorrent-x64.manifest.json",
          "emulebb-$packageVersion-amutorrent-x64.sbom.spdx.json"
        )

        foreach ($asset in $requiredAssets) {
          $source = Join-Path $releaseRoot $asset
          if (-not (Test-Path -LiteralPath $source)) {
            throw "Release asset not found: $source"
          }
          Copy-Item -LiteralPath $source -Destination $artifactRoot
        }

        Get-ChildItem $artifactRoot

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout target source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Create annotated tag
        if: needs.prepare.outputs.tag_exists != 'true'
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          AMUTORRENT_VERSION: ${{ needs.prepare.outputs.amutorrent_version }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "eMuleBB release automation"
          git config user.email "actions@users.noreply.github.com"
          git tag -a "${TAG_NAME}" "${TARGET_SHA}" -m "aMuTorrent ${AMUTORRENT_VERSION} for eMuleBB ${PACKAGE_VERSION}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          AMUTORRENT_VERSION: ${{ needs.prepare.outputs.amutorrent_version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
          RELEASE_KIND: ${{ needs.prepare.outputs.release_kind }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists: ${TAG_NAME}" >&2
            exit 1
          fi

          cat > notes.md <<EOF
          aMuTorrent ${AMUTORRENT_VERSION} for eMuleBB ${PACKAGE_VERSION}

          Release type: ${RELEASE_KIND}
          Target commit: ${TARGET_SHA}
          eMuleBB package version: ${PACKAGE_VERSION}

          Assets were generated by GitHub Actions from the target commit.
          Release assets include the Windows controller package, manifest, SPDX SBOM, and GitHub artifact attestations.

          Verify a downloaded asset with:

              gh attestation verify PATH_TO_ASSET -R ${GITHUB_REPOSITORY}
          EOF

          release_args=(
            --repo "${GITHUB_REPOSITORY}"
            --target "${TARGET_SHA}"
            --title "aMuTorrent ${AMUTORRENT_VERSION} for eMuleBB ${PACKAGE_VERSION}"
            --notes-file notes.md
            --verify-tag
          )

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease --latest=false)
          else
            release_args+=(--latest)
          fi

          gh release create "${TAG_NAME}" dist/* "${release_args[@]}"
